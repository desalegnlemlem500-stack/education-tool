<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
        body { background: #f4f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chatbot {
            width: 900px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        header { padding: 20px; background: #1a73e8; color: #fff; text-align: center; border-bottom: 1px solid #ddd; }
        .chatbox { flex: 1; overflow-y: auto; padding: 20px; list-style: none; scroll-behavior: smooth; }
        .chat { display: flex; margin-bottom: 20px; }
        .chat p { padding: 14px 18px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .incoming { justify-content: flex-start; }
        .incoming p { background: #f1f3f4; color: #202124; border-bottom-left-radius: 0; }
        .outgoing { justify-content: flex-end; }
        .outgoing p { background: #1a73e8; color: #fff; border-bottom-right-radius: 0; }
        
        .chat-input { display: flex; padding: 15px 20px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        textarea { flex: 1; border: none; outline: none; resize: none; height: 25px; font-size: 1rem; color: #333; }
        #send-btn { color: #1a73e8; cursor: pointer; font-size: 28px; margin-left: 12px; user-select: none; }
        .error { color: #d93025 !important; background: #fde7e9 !important; border: 1px solid #f8d7da; }
    </style>
</head>
<body>
    <div class="chatbot">
        <header><h2>Gemini Assistant</h2></header>
        <ul class="chatbox">
            <li class="chat incoming"><p>Hi! I'm your AI assistant. Send me a message to start chatting! 🚀</p></li>
        </ul>
        <div class="chat-input">
            <textarea placeholder="Ask me anything..." spellcheck="false" required></textarea>
            <span id="send-btn" class="material-symbols-outlined">send</span>
        </div>
    </div>

    <script>
        const chatInput = document.querySelector(".chat-input textarea");
        const sendChatBtn = document.querySelector("#send-btn");
        const chatbox = document.querySelector(".chatbox");

        // Your Active API Key
        const API_KEY = "AIzaSyBANG1ohFHscjiZof2I-khhP652PhbW4Ps"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        let history = []; // This stores the conversation history

        const createChatLi = (message, className) => {
            const chatLi = document.createElement("li");
            chatLi.classList.add("chat", className);
            chatLi.innerHTML = `<p>${message}</p>`;
            return chatLi;
        }

        const getGeminiResponse = async (incomingChatLi, userMsg) => {
            const messageElement = incomingChatLi.querySelector("p");

            // Update history with the user's message
            history.push({ role: "user", parts: [{ text: userMsg }] });

            const requestOptions = {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history })
            };

            try {
                const response = await fetch(API_URL, requestOptions);
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error.message);
                
                const botText = data.candidates[0].content.parts[0].text;
                
                // Update history with the bot's message
                history.push({ role: "model", parts: [{ text: botText }] });
                
                messageElement.innerText = botText;
            } catch (error) {
                messageElement.classList.add("error");
                messageElement.innerText = "Error: " + error.message;
            } finally {
                chatbox.scrollTo(0, chatbox.scrollHeight);
            }
        }

        const handleChat = () => {
            const userMessage = chatInput.value.trim();
            if (!userMessage) return;
            chatInput.value = "";

            chatbox.appendChild(createChatLi(userMessage, "outgoing"));
            chatbox.scrollTo(0, chatbox.scrollHeight);

            setTimeout(() => {
                const incomingChatLi = createChatLi("Thinking...", "incoming");
                chatbox.appendChild(incomingChatLi);
                getGeminiResponse(incomingChatLi, userMessage);
            }, 500);
        }

        sendChatBtn.addEventListener("click", handleChat);
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });
    </script>
</body>
</html>
